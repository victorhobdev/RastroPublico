bundle:
  name: rastro-publico

variables:
  landing_root:
    description: Volume com os arquivos anuais e manifests imutáveis.
  contexto_root:
    description: Volume com as fontes contextuais da mesma competência.
  data_inicio:
    default: "2025-07-18"
  data_fim:
    default: "2026-07-17"
  competencia:
    default: "2026-07"
  run_id:
    default: "portfolio-reproducao"

resources:
  jobs:
    pipeline_anual:
      name: RastroPublico - pipeline anual
      max_concurrent_runs: 1
      queue:
        enabled: true
      tasks:
        - task_key: preparar_snapshot
          max_retries: 1
          min_retry_interval_millis: 30000
          notebook_task:
            notebook_path: ./notebooks/10_preparar_bronze_janela.py
            base_parameters:
              landing_root: ${var.landing_root}
              data_inicio: ${var.data_inicio}
              data_fim: ${var.data_fim}
              run_id: ${var.run_id}
        - task_key: silver_contratacoes
          depends_on:
            - task_key: preparar_snapshot
          notebook_task:
            notebook_path: ./notebooks/03_transformar_contratacoes.py
            base_parameters:
              source_root: ${workspace.file_path}/src
              input_schema: workspace.staging
        - task_key: silver_nucleo
          depends_on:
            - task_key: silver_contratacoes
          notebook_task:
            notebook_path: ./notebooks/04_transformar_nucleo.py
            base_parameters:
              source_root: ${workspace.file_path}/src
              input_schema: workspace.staging
              data_inicio: ${var.data_inicio}
              data_fim: ${var.data_fim}
              run_id: ${var.run_id}
              modo: reprocessamento
              sobreposicao_dias: "3"
        - task_key: silver_contratos
          depends_on:
            - task_key: silver_nucleo
          notebook_task:
            notebook_path: ./notebooks/07_transformar_contratos.py
            base_parameters:
              source_root: ${workspace.file_path}/src
              input_schema: workspace.staging
              run_id: ${var.run_id}
        - task_key: gold_base
          depends_on:
            - task_key: silver_contratos
          notebook_task:
            notebook_path: ./notebooks/05_publicar_gold.py
            base_parameters:
              source_root: ${workspace.file_path}/src
              minimo_fornecedores: "2"
              minimo_resultados: "3"
              cobertura_minima: "0.8"
        - task_key: gold_contexto
          depends_on:
            - task_key: gold_base
          notebook_task:
            notebook_path: ./notebooks/09_publicar_contexto_e_gold.py
            base_parameters:
              source_root: ${workspace.file_path}/src
              landing_root: ${var.contexto_root}
              competencia: ${var.competencia}
              run_id: ${var.run_id}

    benchmark_spark:
      name: RastroPublico - benchmark Spark
      max_concurrent_runs: 1
      tasks:
        - task_key: benchmark
          timeout_seconds: 2400
          notebook_task:
            notebook_path: ./notebooks/06_benchmark_inicial.py
            base_parameters:
              source_root: ${workspace.file_path}/src
              strategy: all
              repeticoes: "4"
              run_label: reproducao

targets:
  dev:
    default: true
    mode: development
